# =============================================================================
# NarrativeOS — RBAC Configuration
# 3 team accounts + 1 read-only viewer
# =============================================================================
apiVersion: superplane.io/v1
kind: RBAC
metadata:
  name: narrativeos-rbac
  title: "NarrativeOS Team Access Control"
spec:
  roles:
    - name: admin
      description: "Full access — all canvases, secrets, and settings"
      permissions:
        - canvases: ["read", "write", "execute", "delete"]
        - components: ["read", "write", "delete"]
        - secrets: ["read", "write", "delete"]
        - monitoring: ["read", "write"]
        - rbac: ["read", "write"]

    - name: operator
      description: "Execute canvases, view runs, no secret access"
      permissions:
        - canvases: ["read", "execute"]
        - monitoring: ["read"]
        - secrets: []

    - name: viewer
      description: "Read-only access to runs and dashboards"
      permissions:
        - canvases: ["read"]
        - monitoring: ["read"]
        - secrets: []

  accounts:
    - email: "member1@narrativeos.dev"
      role: operator
      display_name: "Member 1 — Sensory Lead"
      description: "Owns Apify Actors and data pipeline"

    - email: "member2@narrativeos.dev"
      role: operator
      display_name: "Member 2 — Cognitive Lead"
      description: "Owns Zynd agent mesh and reasoning"

    - email: "member3@narrativeos.dev"
      role: admin
      display_name: "Member 3 — Platform Lead"
      description: "Owns Superplane orchestration and infrastructure"

    - email: "viewer@narrativeos.dev"
      role: viewer
      display_name: "Read-Only Viewer"
      description: "External stakeholder or audit access"
