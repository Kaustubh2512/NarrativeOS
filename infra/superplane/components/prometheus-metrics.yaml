# =============================================================================
# NarrativeOS — Prometheus Metrics Exporter Component
# Exposes pipeline metrics for Grafana dashboard and alerting
# =============================================================================
apiVersion: superplane.io/v1
kind: Component
metadata:
  name: prometheus-metrics
  title: "Prometheus Metrics Exporter"
  description: "Exposes pipeline metrics (counters, gauges, histograms) for Prometheus scraping"
  tags: [monitoring, prometheus, metrics, observability]
spec:
  type: prometheus
  config:
    endpoint: /metrics
    namespace: narrativeos
    buckets: [0.1, 0.5, 1, 2.5, 5, 10, 30, 60, 120]

  counters:
    - name: events_ingested_total
      help: "Total NarrativeEvents ingested by source"
      label_names: [source, actor]

    - name: signals_total
      help: "Total AnalysisSignals generated by direction"
      label_names: [ticker, direction]

    - name: pipeline_runs_total
      help: "Total pipeline runs by canvas and status"
      label_names: [canvas, status]

    - name: pipeline_errors_total
      help: "Total pipeline errors by canvas and error type"
      label_names: [canvas, error_type]

  gauges:
    - name: active_pipeline_runs
      help: "Number of currently active pipeline runs"
      label_names: [canvas]

    - name: signal_confidence
      help: "Latest signal confidence score per ticker"
      label_names: [ticker]

    - name: last_processed_timestamp
      help: "Unix timestamp of last successfully processed event"
      label_names: [source]

  histograms:
    - name: pipeline_duration_seconds
      help: "Pipeline execution duration in seconds"
      label_names: [canvas]
      buckets: [0.1, 0.5, 1, 2.5, 5, 10, 30, 60, 120, 300]

    - name: agent_processing_duration_seconds
      help: "Agent processing time in seconds"
      label_names: [agent_name]
      buckets: [0.1, 0.5, 1, 2.5, 5, 10, 30, 60]
